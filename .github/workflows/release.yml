name: Release

# Automated, tag-based semantic versioning.
# Runs when `dev` (or any branch) is merged into `main`.
# Computes the next semver from Conventional Commits, pushes a git tag,
# and publishes a GitHub Release. Deployment is handled natively by
# Vercel's Git integration (push to main -> production), so no deploy
# step or secrets are needed here.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch          # fix: -> patch, feat: -> minor, BREAKING CHANGE -> major
          release_branches: main
          tag_prefix: v

      - name: Publish GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
